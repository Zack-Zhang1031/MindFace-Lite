raw_grid_dir: data/raw/grid
output_dir: data/processed/grid_mouth

scan:
  require_alignment: true
  require_video: false
  max_samples:
  seed: 42

features:
  fps: 25
  frame_ms: 40
  feature_dim: 70

labels:
  source: rms_rule
  noise_floor: 0.01
  gamma: 0.65
  smoothing: 0.35

split:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

output:
  overwrite: true
  manifest_name: manifest.csv
  log_path: outputs/logs/prepare_grid.log
