dataset:
  dir: data/processed/grid_mouth_debug
features:
  fps: 25
  frame_ms: 40
model:
  type: mlp
  params:
    input_dim: 70
    hidden_dim: 64
    output_dim: 3
    dropout: 0.05
train:
  seed: 42
  device: cuda
  epochs: 1
  batch_size: 32
  lr: 0.001
  num_workers: 0
output:
  checkpoint_path: outputs/checkpoints/grid_debug_mlp_mouth.pt
  log_path: outputs/logs/train_grid_debug_mlp.log
  experiment_root: outputs/experiments
