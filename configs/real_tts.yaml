engine: pyttsx3
text: "MindFace Lite 使用真实 TTS 音频驱动嘴巴动画。"

audio:
  output_path: outputs/audio/real_tts.wav
  sample_rate: 16000

pyttsx3:
  rate: 170
  volume: 1.0
  voice_contains: null
  isolate_subprocess: auto

edge_tts:
  voice: zh-CN-XiaoxiaoNeural
  rate: "+0%"
  volume: "+0%"

logging:
  log_path: outputs/logs/real_tts.log

rule_config: configs/rule_demo.yaml

outputs:
  video_path: outputs/videos/real_tts_rule_mouth_demo.mp4
  csv_path: outputs/logs/real_tts_rule_demo.csv
