grid:
  video_dir: data/raw/grid/video
  output_dir: data/processed/grid_video_landmarks
  max_videos: null
  split_ratios: [0.8, 0.1, 0.1]
  split_strategy: auto
  seed: 42

landmarks:
  # cpu is the stable default. gpu can be tried on supported MediaPipe Python platforms.
  delegate: cpu
  refine_landmarks: true
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  model_path: models/external/mediapipe/face_landmarker.task
  model_url: https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task
  auto_download_model: true

logging:
  log_path: outputs/logs/grid_video_landmarks.log

quality:
  report_path: outputs/reports/grid_video_landmark_quality.json
  min_detection_rate: 0.95
