dataset:
  dir: data/synthetic_mouth
features:
  fps: 25
  frame_ms: 40
model:
  type: tcn
  params:
    input_dim: 70
    hidden_dim: 96
    output_dim: 3
    dropout: 0.05
train:
  seed: 42
  device: auto
  epochs: 2
  batch_size: 8
  lr: 0.001
  num_workers: 0
output:
  checkpoint_path: outputs/checkpoints/tcn_mouth.pt
  log_path: outputs/logs/train_tcn.log
  experiment_root: outputs/experiments
