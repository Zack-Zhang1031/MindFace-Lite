name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy==1.26.4 opencv-python-headless==4.11.0.86 pyyaml==6.0.3 "pytest>=9.1,<10.0"
          python -m pip install "torch==2.11.0+cpu" --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple
          python -m pip install -e .

      - name: Compile Python files
        run: python -m compileall -q src scripts tests

      - name: Run tests
        run: python -m pytest
